<!DOCTYPE html>
<html lang="ja" class="no-touch">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GemHub</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#eaeef7;--bg-panel:#f4f6fb;--bg-white:#ffffff;
  --sidebar-bg:#dde3f0;--border:rgba(0,0,0,0.08);--border-mid:rgba(0,0,0,0.13);
  --accent:#1a73e8;--accent-bg:rgba(26,115,232,0.10);--accent-bg2:rgba(26,115,232,0.06);
  --danger:#e53935;--danger-bg:rgba(229,57,53,0.09);
  --green:#34a853;--green-bg:rgba(52,168,83,0.1);
  --orange:#f59e0b;--orange-bg:rgba(245,158,11,0.1);
  --purple:#7c3aed;--purple-bg:rgba(124,58,237,0.09);
  --text:#1f2937;--text2:#4b5563;--text3:#9ca3af;
  --hover-bg:rgba(26,115,232,0.07);--active-bg:rgba(26,115,232,0.12);
  --shadow:0 1px 4px rgba(0,0,0,0.08);--shadow-md:0 2px 12px rgba(0,0,0,0.10);
  --sidebar-w:280px;--radius:10px;--radius-sm:8px;
  --font:'Noto Sans JP',sans-serif;--font-mono:'DM Mono',monospace;
  --sop-accent:#d97706;--sop-bg:rgba(217,119,6,0.055);--sop-border:rgba(217,119,6,0.22);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-weight:400;line-height:1.6;min-height:100vh;display:flex}
.sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);height:100vh;background:var(--sidebar-bg);border-right:1px solid var(--border-mid);display:flex;flex-direction:column;overflow:hidden;position:fixed;left:0;top:0;z-index:100;transition:transform .3s cubic-bezier(.4,0,.2,1)}
.sidebar-header{padding:18px 16px 12px;border-bottom:1px solid var(--border-mid);flex-shrink:0}
.logo{font-size:15px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:8px;margin-bottom:3px}
.logo-gem{width:24px;height:24px;background:linear-gradient(135deg,#1a73e8,#34a853);border-radius:6px;display:inline-flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;color:#fff;font-weight:700}
.logo-sub{font-size:10.5px;color:var(--text3);font-family:var(--font-mono);letter-spacing:.03em}
.search-wrap{padding:9px 11px;border-bottom:1px solid var(--border);flex-shrink:0;position:relative}
.search-icon{position:absolute;left:21px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none;font-size:12px}
.search-input{width:100%;background:var(--bg-white);border:1px solid var(--border-mid);border-radius:20px;padding:7px 10px 7px 28px;font-size:13px;font-family:var(--font);color:var(--text);outline:none;transition:border-color .2s,box-shadow .2s}
.search-input::placeholder{color:var(--text3)}
.search-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(26,115,232,.12)}
.stat-bar{display:flex;padding:9px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
.stat{flex:1;display:flex;flex-direction:column;align-items:center;gap:1px;padding:3px 0}
.stat:first-child{align-items:flex-start}.stat:last-child{align-items:flex-end}
.stat-num{font-family:var(--font-mono);font-size:19px;font-weight:500;color:var(--accent);line-height:1}
.stat-label{font-size:9px;color:var(--text3);font-family:var(--font-mono);letter-spacing:.05em;text-transform:uppercase}
.cat-list{overflow-y:auto;flex:1;padding:5px 7px;scrollbar-width:thin;scrollbar-color:var(--border-mid) transparent}
.cat-list::-webkit-scrollbar{width:4px}.cat-list::-webkit-scrollbar-track{background:transparent}.cat-list::-webkit-scrollbar-thumb{background:var(--border-mid);border-radius:2px}
.cat-btn{display:flex;align-items:center;gap:7px;width:100%;padding:7px 10px;border-radius:var(--radius-sm);border:none;background:transparent;color:var(--text2);font-family:var(--font);font-size:12px;font-weight:400;cursor:pointer;text-align:left;transition:background .15s,color .15s;line-height:1.35}
.cat-btn:hover{background:var(--hover-bg);color:var(--text)}.cat-btn.active{background:var(--active-bg);color:var(--accent);font-weight:500}
.cat-icon{font-size:12px;flex-shrink:0;width:16px;text-align:center}.cat-label{flex:1}
.cat-count{font-family:var(--font-mono);font-size:10px;color:var(--text3);background:rgba(0,0,0,0.06);border-radius:8px;padding:1px 5px;flex-shrink:0}
.cat-btn.active .cat-count{background:var(--accent-bg);color:var(--accent)}
.sop-separator{height:1px;background:var(--border-mid);margin:7px 3px 6px;opacity:.65}
.cat-btn.sop-cat-btn{border-left:2.5px solid var(--sop-accent);padding-left:8px}
.cat-btn.sop-cat-btn:hover{background:rgba(217,119,6,0.08);color:#92400e}
.cat-btn.sop-cat-btn.active{background:rgba(217,119,6,0.12);color:var(--sop-accent);font-weight:500}
.cat-btn.sop-cat-btn.active .cat-count{background:rgba(217,119,6,0.14);color:var(--sop-accent)}
.cat-sop-tag{font-family:var(--font-mono);font-size:9px;font-weight:700;color:var(--sop-accent);flex-shrink:0;width:24px;letter-spacing:.02em}
.main{margin-left:var(--sidebar-w);flex:1;height:100vh;overflow-y:auto;display:flex;flex-direction:column;background:var(--bg);scrollbar-width:thin;scrollbar-color:var(--border-mid) transparent}
.main::-webkit-scrollbar{width:6px}.main::-webkit-scrollbar-track{background:transparent}.main::-webkit-scrollbar-thumb{background:var(--border-mid);border-radius:3px}
.topbar{position:sticky;top:0;z-index:50;background:rgba(234,238,247,0.93);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--border-mid);padding:10px 18px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:10px}
.topbar-left{display:flex;flex-direction:column;gap:1px;min-width:0}
.topbar-title{font-size:14px;font-weight:600;color:var(--text)}
.topbar-meta{font-family:var(--font-mono);font-size:10.5px;color:var(--text3)}
.topbar-actions{display:flex;gap:5px;align-items:center;flex-shrink:0;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:4px;padding:5px 11px;border-radius:20px;border:1.5px solid var(--border-mid);background:var(--bg-white);color:var(--text2);font-family:var(--font);font-size:11px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn:hover{background:var(--bg-panel);border-color:var(--accent);color:var(--accent)}
.btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.btn.active:hover{background:#1557b0;border-color:#1557b0}
.btn.danger{border-color:var(--danger);color:var(--danger)}.btn.danger:hover{background:var(--danger-bg)}
.btn.save-html{background:var(--purple);border-color:var(--purple);color:#fff;font-weight:600}
.btn.save-html:hover{background:#6d28d9;border-color:#6d28d9}
.edit-banner{display:none;background:rgba(26,115,232,.09);border-bottom:1px solid rgba(26,115,232,.18);padding:6px 18px;font-size:11px;color:var(--accent);font-weight:500;text-align:center;flex-shrink:0}
body.edit-mode .edit-banner{display:block}
.content{padding:16px 18px 60px;flex:1}
.section{margin-bottom:7px;animation:fadeUp .28s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.sop-section{margin-bottom:5px}
.sop-section + .section:not(.sop-section){margin-top:14px;padding-top:6px;border-top:1.5px dashed var(--border-mid)}
.section-toggle{display:flex;align-items:center;gap:9px;width:100%;padding:10px 13px;border-radius:var(--radius);border:1px solid var(--border);background:var(--bg-white);box-shadow:var(--shadow);cursor:pointer;text-align:left;transition:background .15s,border-color .15s,border-radius .15s;font-family:var(--font);user-select:none}
.section-toggle:hover{background:var(--bg-panel);border-color:var(--border-mid);box-shadow:var(--shadow-md)}
.section-toggle.open{border-radius:var(--radius) var(--radius) 0 0;border-color:rgba(26,115,232,.28);border-bottom-color:transparent;box-shadow:none}
.section-toggle.sop-cat{background:var(--sop-bg);border-left:3px solid var(--sop-accent);border-color:var(--sop-border)}
.section-toggle.sop-cat:hover{background:rgba(217,119,6,0.10);border-left-color:var(--sop-accent)}
.section-toggle.sop-cat.open{border-color:rgba(217,119,6,.35);border-left-color:var(--sop-accent);border-bottom-color:transparent}
.section-icon{font-size:14px;flex-shrink:0}
.section-title{flex:1;font-size:13px;font-weight:600;color:var(--text);line-height:1.3}
.section-count{font-family:var(--font-mono);font-size:10px;color:var(--text3);background:rgba(0,0,0,0.06);border-radius:8px;padding:1px 6px;flex-shrink:0;transition:background .15s,color .15s}
.section-toggle.open .section-count{background:var(--accent-bg);color:var(--accent)}
.section-toggle.sop-cat.open .section-count{background:rgba(217,119,6,0.12);color:var(--sop-accent)}
.cat-edit-btn,.cat-del-btn{background:none;border:none;cursor:pointer;font-size:12px;padding:3px 5px;border-radius:5px;color:var(--text3);opacity:0;transition:opacity .15s,background .15s;flex-shrink:0}
.section-toggle:hover .cat-edit-btn,.section-toggle:hover .cat-del-btn{opacity:1}
.cat-edit-btn:hover{background:var(--accent-bg);color:var(--accent)}
.cat-del-btn:hover{background:var(--danger-bg);color:var(--danger)}
.chevron{font-size:9px;color:var(--text3);transition:transform .25s cubic-bezier(.4,0,.2,1);flex-shrink:0}
.section-toggle.open .chevron{transform:rotate(180deg)}
.section-body{max-height:0;overflow:hidden;transition:max-height .38s cubic-bezier(.4,0,.2,1);background:var(--bg-white);border:1px solid rgba(26,115,232,.28);border-top:none;border-radius:0 0 var(--radius) var(--radius)}
.section-body.open{max-height:5000px}
.section-body.sop-body{border-color:rgba(217,119,6,.25)}
.section-body-inner{padding:7px 9px 11px}
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:5px}
.card{display:flex;align-items:center;gap:7px;padding:7px 9px;border-radius:var(--radius-sm);border:1.5px solid transparent;background:var(--bg);text-decoration:none;color:inherit;cursor:pointer;transition:background .14s,border-color .14s,box-shadow .14s,opacity .2s;position:relative;user-select:none}
.card:hover{background:var(--bg-panel);border-color:var(--border-mid);box-shadow:var(--shadow)}
.card.linked:hover{background:rgba(26,115,232,.06);border-color:rgba(26,115,232,.28)}
.card.sop-card.linked:hover{background:rgba(217,119,6,0.06);border-color:rgba(217,119,6,.3)}
.card.drag-over{border-color:var(--accent);background:var(--accent-bg2);box-shadow:0 0 0 2px rgba(26,115,232,.25)}
.card.dragging{opacity:.35;cursor:grabbing}
.drag-handle{display:none;flex-shrink:0;cursor:grab;color:var(--text3);font-size:13px;padding:0 2px;line-height:1}
body.edit-mode .drag-handle{display:flex;align-items:center}
body.edit-mode .card{cursor:default}
.card-dot{width:6px;height:6px;border-radius:50%;background:var(--border-mid);flex-shrink:0}
.card.linked .card-dot{background:var(--green)}
.card-step{width:16px;height:16px;border-radius:50%;background:var(--sop-accent);color:#fff;font-size:9px;font-family:var(--font-mono);font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;line-height:1}
.card-name{font-size:12px;color:var(--text);flex:1;line-height:1.4;word-break:break-all;min-width:0}
.card-arrow{font-size:10px;color:var(--text3);flex-shrink:0;opacity:0;transform:translateX(-3px);transition:opacity .12s,transform .12s}
.card:hover .card-arrow{opacity:1;transform:translateX(0)}
.card-actions{display:none;gap:2px;flex-shrink:0}
body.edit-mode .card-actions{display:flex}
body.edit-mode .card-arrow{display:none}
.card-act-btn{background:none;border:none;cursor:pointer;padding:3px 4px;border-radius:4px;font-size:11px;color:var(--text3);transition:background .12s,color .12s;line-height:1}
.card-act-btn.edit:hover{background:var(--accent-bg);color:var(--accent)}
.card-act-btn.del:hover{background:var(--danger-bg);color:var(--danger)}
.add-gem-row{display:none;margin-top:5px}
body.edit-mode .add-gem-row{display:block}
.add-gem-btn{display:flex;align-items:center;gap:6px;padding:6px 10px;border-radius:var(--radius-sm);border:1.5px dashed var(--border-mid);background:transparent;color:var(--text3);font-family:var(--font);font-size:12px;cursor:pointer;width:100%;transition:border-color .15s,color .15s,background .15s}
.add-gem-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-bg2)}
.add-cat-row{display:none;margin-bottom:7px}
body.edit-mode .add-cat-row{display:block}
.add-cat-btn{display:flex;align-items:center;gap:6px;padding:10px 13px;border-radius:var(--radius);border:1.5px dashed var(--border-mid);background:transparent;color:var(--text3);font-family:var(--font);font-size:12.5px;cursor:pointer;width:100%;transition:border-color .15s,color .15s,background .15s}
.add-cat-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-bg2)}
.hl{background:rgba(26,115,232,.18);border-radius:2px;color:var(--accent);font-weight:600}
.empty-state{text-align:center;padding:50px 20px;color:var(--text3)}
.empty-icon{font-size:30px;margin-bottom:8px}.empty-msg{font-size:13.5px}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.35);z-index:300;align-items:center;justify-content:center;padding:20px}
.modal-overlay.show{display:flex}
.modal{background:var(--bg-white);border-radius:14px;padding:22px;width:100%;max-width:420px;box-shadow:0 8px 40px rgba(0,0,0,0.18);animation:modalIn .2s ease}
@keyframes modalIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
.modal-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:16px}
.modal-field{margin-bottom:12px}
.modal-label{font-size:11.5px;font-weight:600;color:var(--text2);margin-bottom:4px;display:block}
.modal-input{width:100%;border:1.5px solid var(--border-mid);border-radius:var(--radius-sm);padding:8px 11px;font-size:13px;font-family:var(--font);color:var(--text);outline:none;background:var(--bg);transition:border-color .2s,box-shadow .2s}
.modal-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(26,115,232,.12);background:var(--bg-white)}
.modal-actions{display:flex;gap:7px;justify-content:flex-end;margin-top:18px}
.cat-type-toggle{display:flex;gap:6px;margin-bottom:2px}
.cat-type-btn{flex:1;padding:7px 10px;border-radius:var(--radius-sm);border:1.5px solid var(--border-mid);background:var(--bg);color:var(--text2);font-family:var(--font);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;text-align:center;line-height:1.4}
.cat-type-btn.sel-normal{background:var(--accent-bg);border-color:var(--accent);color:var(--accent)}
.cat-type-btn.sel-sop{background:rgba(217,119,6,0.12);border-color:var(--sop-accent);color:var(--sop-accent)}
.sop-inset{background:rgba(217,119,6,0.05);border:1px solid var(--sop-border);border-radius:var(--radius-sm);padding:10px 12px;margin-top:2px}
.sop-inset-label{font-size:9.5px;font-family:var(--font-mono);color:var(--sop-accent);font-weight:700;letter-spacing:.07em;margin-bottom:6px;display:flex;align-items:center;gap:5px}
.icon-btn{width:30px;height:30px;border-radius:6px;border:1.5px solid var(--border);background:var(--bg);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:border-color .12s,background .12s;line-height:1}
.icon-btn:hover{border-color:var(--accent);background:var(--accent-bg2)}
.icon-picker{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.cat-drag-handle{display:none;flex-shrink:0;cursor:grab;color:var(--text3);font-size:15px;padding:0 4px 0 0;line-height:1;user-select:none}
body.edit-mode .cat-drag-handle{display:flex;align-items:center}
.cat-drag-handle:active{cursor:grabbing}
.section.cat-dragging{opacity:.3}
.section.cat-drag-over > .section-toggle{border-top:2.5px solid var(--accent) !important}
.section.sop-section.cat-drag-over > .section-toggle{border-top-color:var(--sop-accent) !important}
.cat-sort-btn{display:none;background:none;border:none;cursor:pointer;font-size:9px;padding:2px 3px;border-radius:4px;color:var(--text3);line-height:1;flex-shrink:0;transition:background .12s,color .12s}
body.edit-mode .cat-sort-btn{display:flex;align-items:center}
.cat-sort-btn:hover{background:var(--accent-bg);color:var(--accent)}
.cat-sort-btn:disabled{opacity:.25;cursor:default;pointer-events:none}
.tool-badge{font-family:var(--font-mono);font-size:8px;font-weight:700;border-radius:3px;padding:1px 5px;flex-shrink:0;letter-spacing:.04em;line-height:1.6;white-space:nowrap;align-self:flex-start;margin-top:1px}
.tb-gem{background:rgba(52,168,83,0.13);color:#27743a;border:1px solid rgba(52,168,83,0.32)}
.tb-skill{background:var(--accent-bg);color:#1557b0;border:1px solid rgba(26,115,232,0.28)}
.card-inner{display:flex;flex-direction:column;flex:1;min-width:0}
.card-note{font-size:10px;color:var(--text3);line-height:1.4;margin-top:2px;word-break:break-all}
.card.sop-card .card-note{color:rgba(146,64,14,0.65)}
#modalGemTypeRow{display:flex;gap:5px;flex-wrap:wrap;margin-top:3px}
.gmt-btn{padding:4px 10px;border-radius:var(--radius-sm);border:1.5px solid var(--border-mid);background:var(--bg);color:var(--text2);font-family:var(--font);font-size:11px;font-weight:500;cursor:pointer;transition:all .15s;line-height:1.4}
.gmt-btn.gmt-active-gem{background:rgba(52,168,83,0.12);border-color:rgba(52,168,83,0.5);color:#27743a}
.gmt-btn.gmt-active-skill{background:var(--accent-bg);border-color:var(--accent);color:var(--accent)}
.rm-phase-tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.rm-phase-tab{display:flex;flex-direction:column;align-items:flex-start;padding:9px 14px;border-radius:var(--radius);border:1.5px solid var(--border-mid);background:var(--bg-white);cursor:pointer;font-family:var(--font);flex:1;min-width:130px;transition:all .15s;box-shadow:var(--shadow);text-align:left}
.rm-phase-num{font-family:var(--font-mono);font-size:9px;font-weight:700;letter-spacing:.07em;opacity:.65;line-height:1}
.rm-phase-name{font-size:13px;font-weight:600;color:var(--text);margin-top:3px;line-height:1.2}
.rm-phase-time{font-family:var(--font-mono);font-size:9px;color:var(--text3);margin-top:4px}
.rm-phase-tab.rp1.active{background:rgba(124,58,237,.07);border-color:rgba(124,58,237,.45);color:#6d28d9}
.rm-phase-tab.rp2.active{background:rgba(26,115,232,.07);border-color:rgba(26,115,232,.45);color:#1557b0}
.rm-phase-tab.rp3.active{background:rgba(52,168,83,.07);border-color:rgba(52,168,83,.45);color:#1e7a3a}
.rm-phase-tab.rp4.active{background:rgba(217,119,6,.07);border-color:rgba(217,119,6,.45);color:#92400e}
.rm-groups{display:flex;flex-direction:column;gap:6px}
.rm-group{border-radius:var(--radius);border:1px solid var(--border);background:var(--bg-white);overflow:hidden;box-shadow:var(--shadow)}
.rm-group-hd{display:flex;align-items:center;gap:8px;padding:9px 12px;cursor:pointer;user-select:none;transition:background .13s}
.rm-group-hd:hover{background:var(--bg-panel)}
.rm-group-id{font-family:var(--font-mono);font-size:9px;font-weight:700;color:var(--text3);letter-spacing:.06em;width:36px;flex-shrink:0}
.rm-group-name{font-size:12.5px;font-weight:600;color:var(--text);flex:1}
.rm-group-time{font-family:var(--font-mono);font-size:9.5px;color:var(--text3);margin-right:4px}
.rm-chevron{font-size:9px;color:var(--text3);transition:transform .22s;flex-shrink:0}
.rm-group.open .rm-chevron{transform:rotate(180deg)}
.rm-step-wrap{display:none;flex-direction:column;gap:3px;padding:4px 12px 10px 48px}
.rm-group.open .rm-step-wrap{display:flex}
.rm-step{display:flex;align-items:flex-start;gap:7px;padding:4px 7px;border-radius:var(--radius-sm);border:1px solid transparent;transition:background .12s,border-color .12s}
.rm-step.rm-linked:hover{background:var(--bg-panel);border-color:var(--border-mid)}
.rm-badge{font-family:var(--font-mono);font-size:8px;font-weight:700;border-radius:3px;padding:2px 5px;flex-shrink:0;line-height:1.5;margin-top:1px;white-space:nowrap}
.rm-b-gem{background:rgba(52,168,83,.13);color:#1e7a3a;border:1px solid rgba(52,168,83,.3)}
.rm-b-skill{background:var(--accent-bg);color:#1557b0;border:1px solid rgba(26,115,232,.28)}

.rm-step-body{display:flex;flex-direction:column;gap:1px;flex:1;min-width:0}
.rm-step-name{font-size:11.5px;color:var(--text);font-weight:500;line-height:1.4;word-break:break-all}
.rm-step-name a{color:inherit;text-decoration:none}
.rm-step-name a:hover{color:var(--accent);text-decoration:underline}
.rm-step-note{font-size:10px;color:var(--text3);line-height:1.35}
.rm-arr{font-size:10px;color:var(--text3);flex-shrink:0;align-self:center;opacity:0;transition:opacity .12s}
.rm-step.rm-linked:hover .rm-arr{opacity:1}
.rm-output{margin-top:10px;padding:9px 12px;border-radius:var(--radius-sm);border:1px dashed rgba(26,115,232,.22);background:rgba(26,115,232,.04);font-size:10.5px;color:var(--text2);line-height:1.7}
.rm-output-lbl{font-family:var(--font-mono);font-size:9px;font-weight:700;color:var(--accent);display:block;margin-bottom:4px;letter-spacing:.05em}
.rm-output-ph4{border-color:rgba(217,119,6,.28);background:rgba(217,119,6,.04)}
.rm-output-ph4 .rm-output-lbl{color:var(--sop-accent)}
.btn-sources{background:#0891b2;border-color:#0891b2;color:#fff;font-weight:600}
.btn-sources:hover{background:#0e7490;border-color:#0e7490;color:#fff}
.btn-sources.active{background:#155e75;border-color:#155e75;color:#fff}
.btn-dmagazine{background:#e91e63;border-color:#e91e63;color:#fff;font-weight:600}
.btn-dmagazine:hover{background:#c2185b;border-color:#c2185b;color:#fff}
.btn-dmagazine.active{background:#880e4f;border-color:#880e4f;color:#fff}
.btn-advisor{background:#f59e0b;border-color:#f59e0b;color:#fff;font-weight:600}
.btn-advisor:hover{background:#d97706;border-color:#d97706;color:#fff}
.btn-advisor.active{background:#92400e;border-color:#92400e}
.btn-memo{background:#059669;border-color:#059669;color:#fff;font-weight:600}
.btn-memo:hover{background:#047857;border-color:#047857;color:#fff}
.btn-memo.active{background:#065f46;border-color:#065f46;color:#fff}
.dm-header{background:linear-gradient(135deg,#e91e63,#c2185b);color:#fff;border-radius:var(--radius);padding:14px 18px;margin-bottom:14px;display:flex;align-items:center;gap:12px}
.dm-header-icon{font-size:26px;flex-shrink:0}
.dm-header-title{font-size:15px;font-weight:700;line-height:1.2}
.dm-header-sub{font-size:10.5px;opacity:.82;font-family:var(--font-mono);margin-top:2px}
.dm-cat{border-radius:var(--radius);border:1px solid var(--border);background:var(--bg-white);overflow:hidden;box-shadow:var(--shadow);margin-bottom:8px}
.dm-cat-hd{display:flex;align-items:center;gap:9px;padding:10px 14px;cursor:pointer;user-select:none;transition:background .13s}
.dm-cat-hd:hover{background:var(--bg-panel)}
.dm-cat-icon{font-size:16px;flex-shrink:0}
.dm-cat-name{font-size:13px;font-weight:600;color:var(--text);flex:1}
.dm-cat-count{font-family:var(--font-mono);font-size:10px;color:var(--text3);background:rgba(0,0,0,.06);border-radius:8px;padding:1px 6px;flex-shrink:0}
.dm-chevron{font-size:9px;color:var(--text3);transition:transform .22s;flex-shrink:0}
.dm-cat.open .dm-chevron{transform:rotate(180deg)}
.dm-cat.open .dm-cat-count{background:rgba(233,30,99,.1);color:#c2185b}
.dm-body{display:none;padding:8px 12px 14px 14px}
.dm-cat.open .dm-body{display:block}
.dm-grid{display:flex;flex-wrap:wrap;gap:6px}
.dm-mag-btn{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border-radius:16px;border:1.5px solid var(--border-mid);background:var(--bg);color:var(--text2);font-family:var(--font);font-size:11.5px;font-weight:500;cursor:pointer;transition:all .14s;text-decoration:none;white-space:nowrap}
.dm-mag-btn:hover{border-color:#e91e63;background:rgba(233,30,99,.07);color:#c2185b}
.dm-mag-btn.linked{border-color:rgba(233,30,99,.35);background:rgba(233,30,99,.05);color:#ad1457}
.dm-mag-dot{width:5px;height:5px;border-radius:50%;background:var(--border-mid);flex-shrink:0}
.dm-mag-btn.linked .dm-mag-dot{background:#e91e63}
.advisor-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.28);z-index:200}
.advisor-overlay.show{display:block}
.advisor-panel{position:fixed;right:0;top:0;height:100vh;width:430px;max-width:100vw;background:var(--bg-white);box-shadow:-4px 0 28px rgba(0,0,0,.13);z-index:210;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .32s cubic-bezier(.4,0,.2,1)}
.advisor-panel.open{transform:translateX(0)}
.advisor-hd{display:flex;align-items:center;gap:9px;padding:13px 15px 11px;border-bottom:1px solid var(--border-mid);flex-shrink:0;background:var(--bg-white)}
.advisor-hd-icon{font-size:18px;flex-shrink:0}
.advisor-hd-text{flex:1;min-width:0}
.advisor-hd-title{font-size:13px;font-weight:700;color:var(--text);line-height:1.2}
.advisor-hd-sub{font-size:10px;color:var(--text3);font-family:var(--font-mono);margin-top:2px}
.advisor-close{background:none;border:none;cursor:pointer;font-size:15px;color:var(--text3);padding:4px 6px;border-radius:5px;line-height:1;flex-shrink:0}

.advisor-body{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:12px;scrollbar-width:thin;scrollbar-color:var(--border-mid) transparent}
.advisor-body::-webkit-scrollbar{width:4px}.advisor-body::-webkit-scrollbar-thumb{background:var(--border-mid);border-radius:2px}
.advisor-welcome{text-align:center;padding:24px 12px;color:var(--text3)}
.advisor-welcome-icon{font-size:32px;margin-bottom:8px}
.advisor-welcome-msg{font-size:12.5px;line-height:1.7;color:var(--text2);margin-bottom:16px}
.advisor-examples{display:flex;flex-direction:column;gap:6px}
.advisor-example{background:var(--bg);border:1.5px solid var(--border-mid);border-radius:var(--radius-sm);padding:7px 10px;font-size:11.5px;color:var(--text2);cursor:pointer;text-align:left;font-family:var(--font);transition:all .13s;line-height:1.5}
.advisor-example:hover{border-color:var(--accent);background:var(--accent-bg2);color:var(--accent)}
.advisor-example::before{content:'💬 ';opacity:.6}
.advisor-goal-badge{background:rgba(245,158,11,0.1);color:#92400e;border:1px solid rgba(245,158,11,.3);border-radius:var(--radius-sm);padding:7px 10px;font-size:11.5px;font-weight:600;line-height:1.5;word-break:break-all}
.advisor-goal-badge::before{content:'🎯 '}
.advisor-response{font-size:12px;line-height:1.85;color:var(--text)}
.advisor-response p{margin:0 0 8px}
.advisor-gem-link{color:var(--accent);text-decoration:none;font-weight:600;border-bottom:1px dotted rgba(26,115,232,.45)}
.advisor-gem-link:hover{background:var(--accent-bg);border-bottom-color:var(--accent);border-radius:2px}
.advisor-loading{text-align:center;padding:28px 16px;color:var(--text3);font-size:12px}
.advisor-error{background:var(--danger-bg);color:var(--danger);border-radius:var(--radius-sm);padding:10px 12px;font-size:12px;line-height:1.5}
.advisor-new-btn{display:flex;align-items:center;justify-content:center;gap:5px;background:none;border:1.5px dashed var(--border-mid);color:var(--text3);font-family:var(--font);font-size:11.5px;padding:7px;border-radius:var(--radius-sm);cursor:pointer;transition:all .14s;width:100%}
.advisor-new-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-bg2)}
.advisor-input-area{padding:11px 13px;border-top:1px solid var(--border-mid);flex-shrink:0;display:flex;flex-direction:column;gap:7px;background:var(--bg-panel)}
.advisor-textarea{width:100%;border:1.5px solid var(--border-mid);border-radius:var(--radius-sm);padding:8px 10px;font-size:12.5px;font-family:var(--font);color:var(--text);outline:none;resize:none;background:var(--bg-white);transition:border-color .2s,box-shadow .2s;line-height:1.55}
.advisor-textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(26,115,232,.1)}
.advisor-textarea::placeholder{color:var(--text3)}
.advisor-input-row{display:flex;align-items:center;justify-content:space-between;gap:8px}
.advisor-hint{font-size:9.5px;color:var(--text3);font-family:var(--font-mono)}
.advisor-submit{display:flex;align-items:center;gap:5px;padding:7px 14px;border-radius:var(--radius-sm);border:none;background:#f59e0b;color:#fff;font-family:var(--font);font-size:12px;font-weight:700;cursor:pointer;transition:background .15s;white-space:nowrap;flex-shrink:0}
.advisor-submit:hover{background:#d97706}
.advisor-submit:disabled{background:var(--border-mid);cursor:default}
.advisor-shuffle-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
.advisor-shuffle-label{font-size:10px;color:var(--text3);font-family:var(--font-mono)}
.advisor-shuffle-btn{display:flex;align-items:center;gap:4px;background:none;border:1.5px solid var(--border-mid);color:var(--text3);font-family:var(--font);font-size:11px;padding:4px 9px;border-radius:12px;cursor:pointer;transition:all .14s}
.advisor-shuffle-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-bg2)}
@keyframes spin-once{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.advisor-shuffle-btn.spin .shuffle-icon{display:inline-block;animation:spin-once .35s ease}
.advisor-random-btn{display:flex;align-items:center;gap:5px;background:none;border:1.5px solid var(--sop-accent);color:var(--sop-accent);font-family:var(--font);font-size:11.5px;font-weight:600;padding:6px 12px;border-radius:var(--radius-sm);cursor:pointer;transition:all .14s;width:100%;justify-content:center}
.advisor-random-btn:hover{background:rgba(217,119,6,.09);border-color:#92400e;color:#92400e}
.advisor-divider{display:flex;align-items:center;gap:8px;margin:6px 0;color:var(--text3);font-size:10px}
.advisor-divider::before,.advisor-divider::after{content:'';flex:1;height:1px;background:var(--border)}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(60px);background:#1f2937;color:#fff;padding:9px 18px;border-radius:20px;font-size:12.5px;font-weight:500;z-index:400;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.mob-toggle{display:none;position:fixed;bottom:20px;right:20px;z-index:200;width:44px;height:44px;border-radius:50%;background:var(--accent);border:none;color:#fff;font-size:17px;cursor:pointer;box-shadow:0 4px 14px rgba(26,115,232,.4);align-items:center;justify-content:center}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:90}
@media(max-width:768px){
  .sidebar{transform:translateX(calc(-1 * var(--sidebar-w)))}
  .sidebar.open{transform:translateX(0)}
  .main{margin-left:0}
  .mob-toggle{display:flex}
  .overlay.show{display:block}
  .content{padding:12px 12px 80px}
  .topbar{padding:9px 12px;flex-wrap:wrap;gap:8px}
  .card-grid{grid-template-columns:1fr}
  .topbar-actions{width:100%;justify-content:flex-start}
  .rm-phase-tab{min-width:calc(50% - 3px)}
  .advisor-panel{width:100%}
}
</style>
</head>
<body>
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="logo"><span class="logo-gem">G</span>Gem Hub</div>
    <div class="logo-sub">Gemini Workspace · <span id="catCountLabel">0</span> Categories</div>
  </div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" class="search-input" id="searchInput" placeholder="Gemを検索..." autocomplete="off">
  </div>
  <div class="stat-bar">
    <div class="stat"><span class="stat-num" id="totalCount">0</span><span class="stat-label">TOTAL</span></div>
    <div class="stat" style="align-items:center"><span class="stat-num" id="catCount">0</span><span class="stat-label">CATS</span></div>
    <div class="stat"><span class="stat-num" id="linkedCount">0</span><span class="stat-label">LINKED</span></div>
  </div>
  <nav class="cat-list" id="catList"></nav>
</aside>
<div class="overlay" id="overlay"></div>
<main class="main" id="main">
  <div class="edit-banner" id="editBanner">✏️ 編集モード — Gemの追加・編集・削除・並び替えができます&nbsp;&nbsp;&nbsp;💾 編集後は「HTMLとして保存」で1ファイルに書き出してください</div>
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-title" id="topbarTitle">すべてのGem</div>
      <div class="topbar-meta" id="topbarMeta"></div>
    </div>
    <div class="topbar-actions">
      <button class="btn btn-sources"   id="sourcesBtn"   onclick="toggleSources()"   title="情報源・口コミ抽出サイト一覧">📡 情報源</button>
      <button class="btn btn-dmagazine" id="dmagazineBtn"  onclick="toggleDmagazine()" title="dマガジン掲載誌をカテゴリ別に表示">📚 dマガジン</button>
      <button class="btn btn-advisor"   id="advisorBtn"    onclick="toggleAdvisor()"   title="「〜したい」を入力すると最適なGem使用順をAIが提案します">🤖 コンシェルジュ</button>
      <button class="btn"               id="roadmapBtn"    onclick="toggleRoadmap()"   title="SNS企画→予約投稿の全工程ロードマップを表示">🗺 ロードマップ</button>
      <button class="btn btn-memo"      id="memoBtn"       onclick="toggleMemo()"      title="メモ帳（note.ms / aNotepad）">📝 メモ</button>
      <button class="btn"               id="editToggleBtn" onclick="toggleEditMode()">✏️ 編集</button>
      <button class="btn save-html"     id="saveHtmlBtn"   onclick="saveAsHtml()"      title="編集内容をHTMLファイルに保存">💾 HTMLとして保存</button>
    </div>
  </div>
  <div class="content" id="content"></div>
</main>
<button class="mob-toggle" id="mobToggle">☰</button>
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalBox">
    <div class="modal-title" id="modalTitle">Gemを追加</div>
    <div class="modal-field">
      <label class="modal-label" id="modalNameLabel" for="modalName">Gem名</label>
      <input type="text" class="modal-input" id="modalName" placeholder="Gem名を入力...">
    </div>
    <div class="modal-field" id="modalUrlField">
      <label class="modal-label" for="modalUrl">URL（任意）</label>
      <input type="text" class="modal-input" id="modalUrl" placeholder="https://gemini.google.com/gem/...">
    </div>
    <div class="modal-field" id="modalGemTypeField">
      <label class="modal-label">ツール種別（SOPパイプライン用）</label>
      <div id="modalGemTypeRow">
        <button type="button" class="gmt-btn gmt-active-gem" id="gmtBtnNone" onclick="Modal.setToolType('')">— 未設定</button>
        <button type="button" class="gmt-btn" id="gmtBtnGem" onclick="Modal.setToolType('gem')">🟢 Gemini Gem</button>
        <button type="button" class="gmt-btn" id="gmtBtnSkill" onclick="Modal.setToolType('skill')">🔵 Claude Skill</button>
      </div>
    </div>
    <div class="modal-field" id="modalNoteField">
      <label class="modal-label" id="modalNoteLabel" for="modalNote">ステップメモ（任意）</label>
      <textarea class="modal-input" id="modalNote" placeholder="このステップの役割・入出力を簡単に..." rows="2" style="resize:none;line-height:1.5;font-size:12px"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="Modal.close()">キャンセル</button>
      <button class="btn active" onclick="Modal.save()">💾 保存</button>
    </div>
  </div>
</div>
<div class="modal-overlay" id="catModalOverlay">
  <div class="modal" id="catModalBox" style="max-width:440px">
    <div class="modal-title" id="catModalTitle">カテゴリを追加</div>
    <div class="modal-field">
      <label class="modal-label">カテゴリタイプ</label>
      <div class="cat-type-toggle">
        <button type="button" class="cat-type-btn" id="ctBtnNormal" onclick="CatModal.setType('normal')">📁 通常カテゴリ</button>
        <button type="button" class="cat-type-btn sel-sop" id="ctBtnSop" onclick="CatModal.setType('sop')">▶ SOP ライン</button>
      </div>
    </div>
    <div class="modal-field">
      <label class="modal-label" for="catModalName">カテゴリ名</label>
      <input type="text" class="modal-input" id="catModalName" placeholder="カテゴリ名を入力...">
    </div>
    <div class="modal-field" id="cmIconField" style="display:none">
      <label class="modal-label" for="catModalIcon">アイコン</label>
      <input type="text" class="modal-input" id="catModalIcon" placeholder="例: 🚀" maxlength="4" style="width:72px;text-align:center;font-size:18px;display:inline-block">
      <div class="icon-picker">
        <button type="button" class="icon-btn" onclick="CatModal.pickIcon(this,'🤖')">🤖</button><button type="button" class="icon-btn" onclick="CatModal.pickIcon(this,'📰')">📰</button><button type="button" class="icon-btn" onclick="CatModal.pickIcon(this,'🎨')">🎨</button><button type="button" class="icon-btn" onclick="CatModal.pickIcon(this,'🎬')">🎬</button><button type="button" class="icon-btn" onclick="CatModal.pickIcon(this,'🔬')">🔬</button><button type="button" class="icon-btn" onclick="CatModal.pickIcon(this,'💡')">💡</button><button type="button" class="icon-btn" onclick="CatModal.pickIcon(this,'📅')">📅</button><button type="button" class="icon-btn" onclick="CatModal.pickIcon(this,'✍️')">✍️</button><button type="button" class="icon-btn" onclick="CatModal.pickIcon(this,'💭')">💭</button><button type="button" class="icon-btn" onclick="CatModal.pickIcon(this,'🛠️')">🛠️</button><button type="button" class="icon-btn" onclick="CatModal.pickIcon(this,'✅')">✅</button><button type="button" class="icon-btn" onclick="CatModal.pickIcon(this,'📄')">📄</button><button type="button" class="icon-btn" onclick="CatModal.pickIcon(this,'💰')">💰</button><button type="button" class="icon-btn" onclick="CatModal.pickIcon(this,'🌏')">🌏</button><button type="button" class="icon-btn" onclick="CatModal.pickIcon(this,'🔗')">🔗</button><button type="button" class="icon-btn" onclick="CatModal.pickIcon(this,'🕵️')">🕵️</button><button type="button" class="icon-btn" onclick="CatModal.pickIcon(this,'📌')">📌</button><button type="button" class="icon-btn" onclick="CatModal.pickIcon(this,'🚀')">🚀</button><button type="button" class="icon-btn" onclick="CatModal.pickIcon(this,'⭐')">⭐</button><button type="button" class="icon-btn" onclick="CatModal.pickIcon(this,'🔥')">🔥</button>
      </div>
    </div>
    <div class="modal-field" id="cmSopField">
      <div class="sop-inset">
        <span class="sop-inset-label"><span style="font-size:10px">▶</span> SOP 設定</span>
        <label class="modal-label" for="catModalSopTag" style="font-size:11px;margin-bottom:4px;display:block">SOPタグ（例: W05）</label>
        <input type="text" class="modal-input" id="catModalSopTag" placeholder="W05" maxlength="8" style="font-family:var(--font-mono);font-weight:700;font-size:14px;letter-spacing:.08em;width:120px">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="CatModal.close()">キャンセル</button>
      <button class="btn active" id="catModalSaveBtn" onclick="CatModal.save()" style="background:var(--sop-accent);border-color:var(--sop-accent);">💾 保存</button>
    </div>
  </div>
</div>
<div class="toast" id="toast">💾 保存しました — 「HTMLとして保存」で書き出すとどこでも使えます</div>
<script id="mainScript">
// ═══════════════════════════════════════════════════════════════
// ★ EMBEDDED DATA — このブロックはsaveAsHtml()が自動更新します

// ═══════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════
let categories    = [];
let activeCategory = 'all';
let searchQuery   = '';
let editMode      = false;
let dmagazineMode = false;
let sourcesMode   = false;
let roadmapMode   = false;
let memoMode      = false;
let dragSrcIndex  = null;
let dragSrcCatId  = null;
let catDragSrcIdx = null;
let nextId        = 200;

// ─── ID 採番 ───────────────────────────────────────────────────
function newId() { return 'g_' + (nextId++); }

// ─── LocalStorage ─────────────────────────────────────────────
function saveToLocalStorage() {
  try {
    localStorage.setItem('gemhub_cats', JSON.stringify(categories));
  } catch(e) { console.warn('localStorage save failed:', e); }
}

// ─── Toast ────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  if (!t) return;
  t.textContent = msg || '💾 保存しました';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}

// ─── migrateGemIds ────────────────────────────────────────────
function migrateGemIds(cats) {
  cats.forEach(cat => {
    cat.gems = (cat.gems || []).map(g => {
      if (!g.id) g.id = newId();
      return g;
    });
  });
  return cats;
}

// ─── saveAsHtml ───────────────────────────────────────────────
function saveAsHtml() {
  const el = document.getElementById('mainScript');
  if (!el) { showToast('❌ スクリプト要素が見つかりません'); return; }
  let src = el.textContent;

  // DATA置換
  src = src.replace(/\/\*DATA_START\*\/[\s\S]*?\/\*DATA_END\*\//,
    '/*DATA_START*/\nconst SAVED_DATA = ' + JSON.stringify(categories, null, 0) + ';\n/*DATA_END*/');

  const full = document.documentElement.outerHTML;
  const scriptIdx = full.indexOf(el.textContent.substring(0, 80));
  let output;
  if (scriptIdx === -1) {
    output = full;
  } else {
    output = full.replace(el.textContent, src);
  }

  // <script id="mainScript">内のデータだけ置換して書き出す
  const blob = new Blob([output], {type: 'text/html;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  const d = new Date();
  const ds = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  a.download = 'GemHub_' + ds + '_.html';
  a.click();
  URL.revokeObjectURL(a.href);
  showToast('💾 HTMLファイルをダウンロードしました');
}

// ═══════════════════════════════════════════════════════════════
// SIDEBAR & META
// ═══════════════════════════════════════════════════════════════
function renderSidebar() {
  const nav = document.getElementById('catList');
  if (!nav) return;
  const q = searchQuery.toLowerCase();
  const sopCats = categories.filter(c => c.sop);
  const normCats = categories.filter(c => !c.sop);

  let html = '';
  // 全Gem ボタン
  const allCount = categories.reduce((s, c) => s + (c.gems || []).length, 0);
  html += `<button class="cat-btn${activeCategory==='all'?' active':''}" onclick="selectCategory('all')">
    <span class="cat-icon">🏠</span><span class="cat-label">すべてのGem</span>
    <span class="cat-count">${allCount}</span>
  </button>`;

  // 通常カテゴリ
  normCats.forEach(cat => {
    const cnt = (cat.gems || []).length;
    const visible = !q || cat.name.toLowerCase().includes(q) ||
      (cat.gems||[]).some(g => g.name.toLowerCase().includes(q));
    if (!visible) return;
    html += `<button class="cat-btn${activeCategory===cat.id?' active':''}" onclick="selectCategory(${cat.id})">
      <span class="cat-icon">${cat.icon||'📁'}</span>
      <span class="cat-label">${cat.name}</span>
      <span class="cat-count">${cnt}</span>
    </button>`;
  });

  // SOP セパレーター
  if (sopCats.length) {
    html += '<div class="sop-separator"></div>';
    sopCats.forEach(cat => {
      const cnt = (cat.gems || []).length;
      const visible = !q || cat.name.toLowerCase().includes(q) ||
        (cat.gems||[]).some(g => g.name.toLowerCase().includes(q));
      if (!visible) return;
      html += `<button class="cat-btn sop-cat-btn${activeCategory===cat.id?' active':''}" onclick="selectCategory(${cat.id})">
        <span class="cat-sop-tag">${cat.sopTag||''}</span>
        <span class="cat-label">${cat.name}</span>
        <span class="cat-count">${cnt}</span>
      </button>`;
    });
  }
  nav.innerHTML = html;

  // カウント更新
  const linked = categories.flatMap(c => c.gems||[]).filter(g => g.url).length;
  const el = n => document.getElementById(n);
  if(el('totalCount'))  el('totalCount').textContent  = allCount;
  if(el('catCount'))    el('catCount').textContent    = categories.length;
  if(el('linkedCount')) el('linkedCount').textContent = linked;
  if(el('catCountLabel')) el('catCountLabel').textContent = categories.length;
}

function updateSidebarActive(id) {
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  if (id === 'all') {
    const first = document.querySelector('.cat-btn');
    if (first) first.classList.add('active');
  } else {
    document.querySelectorAll('.cat-btn').forEach(b => {
      if (b.onclick && b.onclick.toString().includes(String(id))) b.classList.add('active');
    });
  }
}

function updateMeta() {
  const meta = document.getElementById('topbarMeta');
  if (!meta) return;
  if (activeCategory === 'all') {
    const total = categories.reduce((s, c) => s + (c.gems||[]).length, 0);
    const linked = categories.flatMap(c => c.gems||[]).filter(g => g.url).length;
    meta.textContent = `${total} Gems · ${categories.length} Categories · ${linked} Linked`;
  } else {
    const cat = categories.find(c => c.id === activeCategory);
    if (cat) {
      const cnt = (cat.gems||[]).length;
      const linked = (cat.gems||[]).filter(g => g.url).length;
      meta.textContent = `${cnt} Gems · ${linked} Linked`;
    }
  }
}

// ═══════════════════════════════════════════════════════════════
// CATEGORY SELECTION
// ═══════════════════════════════════════════════════════════════
function selectCategory(id) {
  activeCategory = id;
  // close sub-modes
  if (memoMode)      { memoMode = false; const mb=document.getElementById('memoBtn'); if(mb) mb.classList.remove('active'); }
  if (dmagazineMode) { dmagazineMode = false; const b=document.getElementById('dmagazineBtn'); if(b) b.classList.remove('active'); }
  if (sourcesMode)   { sourcesMode   = false; const b=document.getElementById('sourcesBtn');   if(b) b.classList.remove('active'); }
  if (roadmapMode)   { roadmapMode   = false; const b=document.getElementById('roadmapBtn');   if(b) b.classList.remove('active'); }

  const tt = document.getElementById('topbarTitle');
  if (tt) tt.textContent = id === 'all' ? 'すべてのGem' : (categories.find(c=>c.id===id)?.name || '');

  renderContent();
  updateMeta();
  updateSidebarActive(id);

  // モバイル: サイドバーを閉じる
  const sb = document.getElementById('sidebar');
  const ov = document.getElementById('overlay');
  if (sb) sb.classList.remove('open');
  if (ov) ov.classList.remove('show');
}

// ═══════════════════════════════════════════════════════════════
// SEARCH HIGHLIGHT
// ═══════════════════════════════════════════════════════════════
function hl(text, query) {
  if (!query) return text;
  const re = new RegExp('(' + query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
  return text.replace(re, '<mark class="hl">$1</mark>');
}

// ═══════════════════════════════════════════════════════════════
// RENDER CONTENT
// ═══════════════════════════════════════════════════════════════
function renderContent() {
  const content = document.getElementById('content');
  if (!content) return;
  const q = searchQuery.toLowerCase();

  let catsToRender = activeCategory === 'all'
    ? categories
    : categories.filter(c => c.id === activeCategory);

  if (q) {
    catsToRender = catsToRender
      .map(cat => ({
        ...cat,
        gems: (cat.gems||[]).filter(g => g.name.toLowerCase().includes(q))
      }))
      .filter(cat => cat.gems.length || cat.name.toLowerCase().includes(q));
  }

  if (!catsToRender.length) {
    content.innerHTML = `<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-msg">「${searchQuery}」に一致するGemが見つかりませんでした</div></div>`;
    return;
  }

  const sopCats  = catsToRender.filter(c => c.sop);
  const normCats = catsToRender.filter(c => !c.sop);
  const ordered  = [...normCats, ...sopCats];

  let html = '';
  if (editMode) {
    html += `<div class="add-cat-row">
      <button class="add-cat-btn" onclick="openAddCat()">＋ カテゴリを追加</button>
    </div>`;
  }

  ordered.forEach((cat, idx) => {
    const isSop = cat.sop;
    const sopClass = isSop ? ' sop-section' : '';
    const toggleClass = isSop ? ' sop-cat' : '';
    const bodyClass = isSop ? ' sop-body' : '';
    const gems = cat.gems || [];
    const catIdx = categories.findIndex(c => c.id === cat.id);

    html += `<div class="section${sopClass}" id="sec_${cat.id}"
      draggable="${editMode}"
      ondragstart="onCatDragStart(event,${catIdx})"
      ondragover="onCatDragOver(event)"
      ondragleave="onCatDragLeave(event)"
      ondrop="onCatDrop(event,${catIdx})"
      ondragend="onCatDragEnd(event)">
      <button class="section-toggle${toggleClass}" onclick="toggleSection(this)">
        ${editMode ? `<span class="cat-drag-handle" title="ドラッグで並び替え">⠿</span>` : ''}
        ${isSop ? `<span class="sop-pill">▶ ${cat.sopTag||'SOP'}</span>` : `<span class="section-icon">${cat.icon||'📁'}</span>`}
        <span class="section-title">${hl(cat.name, q)}</span>
        <span class="section-count">${gems.length}</span>
        ${editMode ? `
          <button class="cat-sort-btn" onclick="event.stopPropagation();moveCat(${catIdx},-1)" ${catIdx===0?'disabled':''} title="上へ">▲</button>
          <button class="cat-sort-btn" onclick="event.stopPropagation();moveCat(${catIdx},1)"  ${catIdx===categories.length-1?'disabled':''} title="下へ">▼</button>
          <button class="cat-edit-btn" onclick="event.stopPropagation();openEditCat(${cat.id})" title="カテゴリを編集">✏️</button>
          <button class="cat-del-btn"  onclick="event.stopPropagation();deleteCat(${cat.id})"  title="カテゴリを削除">🗑️</button>
        ` : ''}
        <span class="chevron">▾</span>
      </button>
      <div class="section-body${bodyClass}">
        <div class="section-body-inner">
          <div class="card-grid" id="grid_${cat.id}">`;

    gems.forEach((gem, gi) => {
      const isLinked = !!gem.url;
      const isSopCard = isSop;
      const toolBadge = gem.toolType === 'gem'
        ? '<span class="tool-badge tb-gem">GEM</span>'
        : gem.toolType === 'skill'
        ? '<span class="tool-badge tb-skill">SKILL</span>'
        : '';

      html += `<div class="card${isLinked?' linked':''}${isSopCard?' sop-card':''}"
        draggable="${editMode}"
        ondragstart="onDragStart(event,${catIdx},${gi})"
        ondragover="onDragOver(event)"
        ondragleave="onDragLeave(event)"
        ondrop="onDrop(event,${catIdx},${gi})"
        ondragend="onDragEnd(event)"
        onclick="${isLinked&&!editMode?`window.open('${gem.url}','_blank')`:''}">
        ${editMode ? '<span class="drag-handle" title="ドラッグで並び替え">⠿</span>' : ''}
        ${isSopCard
          ? `<span class="card-step">${gi+1}</span>`
          : `<span class="card-dot"></span>`}
        <div class="card-inner">
          <span class="card-name">${hl(gem.name, q)}</span>
          ${gem.note ? `<span class="card-note">${hl(gem.note, q)}</span>` : ''}
        </div>
        ${toolBadge}
        ${!editMode && isLinked ? '<span class="card-arrow">↗</span>' : ''}
        ${editMode ? `<div class="card-actions">
          <button class="card-act-btn edit" onclick="event.stopPropagation();openEditGem(${cat.id},'${gem.id}')" title="編集">✏️</button>
          <button class="card-act-btn del"  onclick="event.stopPropagation();deleteGem(${cat.id},'${gem.id}')"  title="削除">🗑️</button>
        </div>` : ''}
      </div>`;
    });

    html += `</div>`;
    if (editMode) {
      html += `<div class="add-gem-row">
        <button class="add-gem-btn" onclick="openAddGem(${cat.id})">＋ Gemを追加</button>
      </div>`;
    }
    html += `</div></div></div>`;
  });

  content.innerHTML = html;
}

function toggleSection(btn) {
  btn.classList.toggle('open');
  const body = btn.nextElementSibling;
  if (body) body.classList.toggle('open');
}

function toggleEditMode() {
  // close sub-modes
  if (memoMode)      { memoMode = false; const mb=document.getElementById('memoBtn'); if(mb) mb.classList.remove('active'); }
  if (dmagazineMode) { dmagazineMode = false; const b=document.getElementById('dmagazineBtn'); if(b) b.classList.remove('active'); }

  if (btn) {
    btn.textContent = editMode ? '✅ 編集完了' : '✏️ 編集';

    : activeCategory === 'all' ? 'すべてのGem'
    : (categories.find(c=>c.id===activeCategory)?.name || '');
  renderContent();
  updateMeta();
}

// ═══════════════════════════════════════════════════════════════
// GEM MODAL
// ═══════════════════════════════════════════════════════════════
const Modal = (() => {
  let _catId = null, _gemId = null;

  function open(catId, gemId) {
    _catId = catId; _gemId = gemId;
    const cat = categories.find(c => c.id === catId);
    const gem = gemId ? (cat?.gems||[]).find(g => g.id === gemId) : null;
    const isSop = cat?.sop;

    document.getElementById('modalTitle').textContent    = gem ? 'Gemを編集' : 'Gemを追加';
    document.getElementById('modalNameLabel').textContent = isSop ? 'ステップ名' : 'Gem名';
    document.getElementById('modalName').value            = gem?.name || '';
    document.getElementById('modalUrl').value             = gem?.url  || '';
    document.getElementById('modalNote').value            = gem?.note || '';
    document.getElementById('modalNoteLabel').textContent = isSop ? 'ステップメモ（任意）' : 'メモ（任意）';

    // SOP fields
    document.getElementById('modalGemTypeField').style.display = isSop ? 'block' : 'none';
    document.getElementById('modalNoteField').style.display    = isSop ? 'block' : 'none';

    setToolType(gem?.toolType || '');
    document.getElementById('modalOverlay').classList.add('show');
    setTimeout(() => document.getElementById('modalName').focus(), 80);
  }

  function setToolType(t) {
    ['gmtBtnNone','gmtBtnGem','gmtBtnSkill'].forEach(id => {
      const b = document.getElementById(id);
      if(b) { b.classList.remove('gmt-active-gem','gmt-active-skill','gmt-none'); }
    });
    if (t === 'gem') {
      document.getElementById('gmtBtnGem').classList.add('gmt-active-gem');
    } else if (t === 'skill') {
      document.getElementById('gmtBtnSkill').classList.add('gmt-active-skill');
    } else {
      document.getElementById('gmtBtnNone').classList.add('gmt-active-gem');
    }
    Modal._toolType = t;
  }

  function close() {
    document.getElementById('modalOverlay').classList.remove('show');
    _catId = null; _gemId = null;
  }

  function save() {
    const name = document.getElementById('modalName').value.trim();
    if (!name) { document.getElementById('modalName').focus(); return; }
    const url  = document.getElementById('modalUrl').value.trim();
    const note = document.getElementById('modalNote').value.trim();
    const toolType = Modal._toolType || '';

    const cat = categories.find(c => c.id === _catId);
    if (!cat) { close(); return; }

    if (_gemId) {
      const gem = (cat.gems||[]).find(g => g.id === _gemId);
      if (gem) { gem.name = name; gem.url = url; gem.note = note; gem.toolType = toolType; }
    } else {
      cat.gems = cat.gems || [];
      cat.gems.push({ id: newId(), name, url, note, toolType });
    }
    saveToLocalStorage();
    close();
    renderContent();
    renderSidebar();
    showToast(_gemId ? '✏️ Gemを更新しました' : '➕ Gemを追加しました');
  }

  return { open, close, save, setToolType, _toolType: '' };
})();

function openAddGem(catId) { Modal.open(catId, null); }
function openEditGem(catId, gemId) { Modal.open(catId, gemId); }
function deleteGem(catId, gemId) {
  if (!confirm('このGemを削除しますか？')) return;
  const cat = categories.find(c => c.id === catId);
  if (cat) cat.gems = (cat.gems||[]).filter(g => g.id !== gemId);
  saveToLocalStorage();
  renderContent();
  renderSidebar();
  showToast('🗑️ Gemを削除しました');
}

// ═══════════════════════════════════════════════════════════════
// CATEGORY MODAL
// ═══════════════════════════════════════════════════════════════
const CatModal = (() => {
  let _editId = null, _type = 'sop';

  function open(editId) {
    _editId = editId;
    const cat = editId ? categories.find(c => c.id === editId) : null;
    document.getElementById('catModalTitle').textContent = cat ? 'カテゴリを編集' : 'カテゴリを追加';
    document.getElementById('catModalName').value  = cat?.name  || '';
    document.getElementById('catModalIcon').value  = cat?.icon  || '📁';
    document.getElementById('catModalSopTag').value = cat?.sopTag || '';
    setType(cat?.sop ? 'sop' : 'normal');
    document.getElementById('catModalOverlay').classList.add('show');
    setTimeout(() => document.getElementById('catModalName').focus(), 80);
  }

  function setType(t) {
    _type = t;
    document.getElementById('ctBtnNormal').className = 'cat-type-btn' + (t==='normal'?' sel-normal':'');
    document.getElementById('ctBtnSop').className    = 'cat-type-btn' + (t==='sop'?' sel-sop':'');
    document.getElementById('cmIconField').style.display = t==='normal' ? 'block' : 'none';
    document.getElementById('cmSopField').style.display  = t==='sop'    ? 'block' : 'none';
    const sb = document.getElementById('catModalSaveBtn');
    if (sb) sb.style.background = t==='sop' ? 'var(--sop-accent)' : 'var(--accent)';
    if (sb) sb.style.borderColor = t==='sop' ? 'var(--sop-accent)' : 'var(--accent)';
  }

  function pickIcon(btn, icon) {
    document.querySelectorAll('.icon-btn').forEach(b => b.classList.remove('sel'));
    btn.classList.add('sel');
    document.getElementById('catModalIcon').value = icon;
  }

  function close() {
    document.getElementById('catModalOverlay').classList.remove('show');
    _editId = null;
  }

  function save() {
    const name = document.getElementById('catModalName').value.trim();
    if (!name) { document.getElementById('catModalName').focus(); return; }
    const icon   = document.getElementById('catModalIcon').value.trim() || '📁';
    const sopTag = document.getElementById('catModalSopTag').value.trim().toUpperCase();

    if (_editId) {
      const cat = categories.find(c => c.id === _editId);
      if (cat) {
        cat.name = name;
        if (_type === 'sop') { cat.sop = true; cat.sopTag = sopTag; delete cat.icon; }
        else { cat.sop = false; cat.icon = icon; delete cat.sopTag; }
      }
    } else {
      const maxId = categories.reduce((m, c) => Math.max(m, typeof c.id==='number'?c.id:0), 0);
      const newCat = { id: maxId+1, name, gems: [] };
      if (_type === 'sop') { newCat.sop = true; newCat.sopTag = sopTag; }
      else { newCat.icon = icon; }
      categories.push(newCat);
    }
    saveToLocalStorage();
    close();
    renderContent();
    renderSidebar();
    showToast(_editId ? '✏️ カテゴリを更新しました' : '➕ カテゴリを追加しました');
  }

  return { open, close, save, setType, pickIcon };
})();

function openAddCat()     { CatModal.open(null); }
function openEditCat(id)  { CatModal.open(id); }
function deleteCat(id) {
  const cat = categories.find(c => c.id === id);
  if (!cat) return;
  if (!confirm(`「${cat.name}」を削除しますか？\n（${(cat.gems||[]).length}件のGemも削除されます）`)) return;
  categories = categories.filter(c => c.id !== id);
  if (activeCategory === id) activeCategory = 'all';
  saveToLocalStorage();
  renderContent();
  renderSidebar();
  showToast('🗑️ カテゴリを削除しました');
}
function moveCat(idx, dir) {
  const ni = idx + dir;
  if (ni < 0 || ni >= categories.length) return;
  [categories[idx], categories[ni]] = [categories[ni], categories[idx]];
  saveToLocalStorage();
  renderContent();
  renderSidebar();
}

// ═══════════════════════════════════════════════════════════════
// DRAG & DROP (Gem)
// ═══════════════════════════════════════════════════════════════
function onDragStart(e, catIdx, gemIdx) {
  dragSrcIndex = gemIdx; dragSrcCatId = categories[catIdx]?.id;
  e.dataTransfer.effectAllowed = 'move';
  e.currentTarget.classList.add('dragging');
}
function onDragOver(e) {
  e.preventDefault(); e.dataTransfer.dropEffect = 'move';
  e.currentTarget.classList.add('drag-over');
}
function onDragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
function onDrop(e, catIdx, gemIdx) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  const cat = categories[catIdx];
  if (!cat || dragSrcCatId !== cat.id || dragSrcIndex === null || dragSrcIndex === gemIdx) return;
  const gems = cat.gems;
  const [moved] = gems.splice(dragSrcIndex, 1);
  gems.splice(gemIdx, 0, moved);
  saveToLocalStorage();
  renderContent();
}
function onDragEnd(e) {
  e.currentTarget.classList.remove('dragging');
  dragSrcIndex = null; dragSrcCatId = null;
}

// ═══════════════════════════════════════════════════════════════
// DRAG & DROP (Category)
// ═══════════════════════════════════════════════════════════════
function onCatDragStart(e, idx) {
  catDragSrcIdx = idx;
  e.dataTransfer.effectAllowed = 'move';
  e.currentTarget.classList.add('cat-dragging');
}
function onCatDragOver(e) {
  e.preventDefault(); e.dataTransfer.dropEffect = 'move';
  e.currentTarget.classList.add('cat-drag-over');
}
function onCatDragLeave(e) { e.currentTarget.classList.remove('cat-drag-over'); }
function onCatDrop(e, idx) {
  e.preventDefault();
  e.currentTarget.classList.remove('cat-drag-over');
  if (catDragSrcIdx === null || catDragSrcIdx === idx) return;
  const [moved] = categories.splice(catDragSrcIdx, 1);
  categories.splice(idx, 0, moved);
  saveToLocalStorage();
  renderContent();
  renderSidebar();
}
function onCatDragEnd(e) {
  e.currentTarget.classList.remove('cat-dragging');
  catDragSrcIdx = null;
}

let rmPhase = 'rp1';

function findGemUrl(name) {
  for (const cat of categories) {
    const g = (cat.gems||[]).find(gem => gem.name === name || gem.name.includes(name.slice(0,6)));
    if (g?.url) return g.url;
  }
  return null;
}

    if (t.dataset.phase === phase) t.classList.add('active');

}

    <button class="advisor-random-btn" onclick="advisorRandom()">🎲 ランダムで相談する</button>
  </div>`;
}

function advisorQuickFill(text) {
  const ta = document.getElementById('advisorInput');
  if (ta) { ta.value = text; ta.focus(); }
}

async function advisorSubmit() {
  const ta = document.getElementById('advisorInput');
  const input = ta ? ta.value.trim() : '';
  if (!input) return;
  if (ta) ta.value = '';

  const body = document.getElementById('advisorBody');
  if (!body) return;

  if (!advisorGoal) advisorGoal = input;

  advisorHistory.push({ role: 'user', content: input });

  // Show goal + loading
  body.innerHTML = `
    <div class="advisor-goal-badge">${advisorGoal}</div>
    ${advisorHistory.length > 1 ? `<button class="advisor-new-btn" onclick="advisorNewSession()">＋ 新しい相談</button>` : ''}
    <div class="advisor-loading">🤖 Gemの使用順を検討中...</div>`;

  // Build gem catalog for context
  const gemList = categories.flatMap(c => (c.gems||[]).map(g =>
    `- ${g.name}${g.url?' [URL有]':''}${g.note?' ('+g.note+')':''}`
  )).join('\n');

  const systemPrompt = `あなたはGemHubのコンシェルジュです。ユーザーの「〜したい」という目標に対して、登録済みGemの使用順序と理由を提案してください。
返答は日本語で、マークダウン形式（**太字**・番号付きリスト）を使い、200〜400字程度に収めてください。

登録済みGem一覧：
${gemList}`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: systemPrompt,
        messages: advisorHistory
      })
    });
    const data = await response.json();
    const text = data.content?.[0]?.text || '回答を取得できませんでした。';
    advisorHistory.push({ role: 'assistant', content: text });

    // Render response with simple markdown
    const rendered = text
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\n/g, '<br>');

    body.innerHTML = `
      <div class="advisor-goal-badge">${advisorGoal}</div>
      <button class="advisor-new-btn" onclick="advisorNewSession()">＋ 新しい相談</button>
      <div class="advisor-response"><p>${rendered}</p></div>`;
  } catch(e) {
    body.innerHTML = `
      <div class="advisor-goal-badge">${advisorGoal}</div>
      <div class="advisor-error">❌ API呼び出しエラー: ${e.message}</div>
      <button class="advisor-new-btn" onclick="advisorNewSession()">＋ 新しい相談</button>`;
  }
}

    if (roadmapMode)   { roadmapMode   = false; const b=document.getElementById('roadmapBtn');   if(b) b.classList.remove('active'); }
    if (editMode)      {
      editMode = false;
      document.body.classList.remove('edit-mode');
      const eb = document.getElementById('editToggleBtn');
      if (eb) { eb.textContent = '✏️ 編集'; eb.classList.remove('active'); }
      const banner = document.getElementById('editBanner');
      if (banner) banner.style.display = 'none';
    }
    document.getElementById('searchInput').value = '';
    searchQuery = '';
    const tt = document.getElementById('topbarTitle');
    const tm = document.getElementById('topbarMeta');
    if (tt) tt.textContent = '📝 メモ';
    if (tm) tm.textContent = 'note.ms（クイックメモ） / aNotepad（ログイン・デバイス間同期）';
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    renderMemo();
  } else {
    const tt = document.getElementById('topbarTitle');
    const tm = document.getElementById('topbarMeta');
    if (tt) tt.textContent = activeCategory === 'all'
      ? 'すべてのGem'
      : (categories.find(c => c.id === activeCategory)?.name || '');
    renderContent();
    updateMeta();
    updateSidebarActive(activeCategory);
  }
}

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
function init() {
  // Load from localStorage if available, else use embedded data
  let loaded = false;
  try {
    const stored = localStorage.getItem('gemhub_cats');
    if (stored) {
      const parsed = JSON.parse(stored);
      if (Array.isArray(parsed) && parsed.length) {
        categories = migrateGemIds(parsed);
        loaded = true;
      }
    }
  } catch(e) { console.warn('localStorage load failed:', e); }

  if (!loaded) {
    categories = migrateGemIds(JSON.parse(JSON.stringify(SAVED_DATA)));
  }

  // Calculate next ID
  categories.forEach(cat => {
    (cat.gems||[]).forEach(g => {
      const n = parseInt(String(g.id).replace(/\D/g, ''));
      if (!isNaN(n) && n >= nextId) nextId = n + 1;
    });
  });

  // Sidebar search
  const searchInput = document.getElementById('searchInput');
  if (searchInput) {
    searchInput.addEventListener('input', e => {
      searchQuery = e.target.value.trim();
      renderSidebar();
      renderContent();
    });
  }

  // Mobile toggle
  const mobToggle = document.getElementById('mobToggle');
  const sidebar   = document.getElementById('sidebar');
  const overlay   = document.getElementById('overlay');
  if (mobToggle) {
    mobToggle.addEventListener('click', () => {
      sidebar.classList.toggle('open');
      overlay.classList.toggle('show');
    });
  }
  if (overlay) {
    overlay.addEventListener('click', () => {
      sidebar.classList.remove('open');
      overlay.classList.remove('show');
    });
  }

  // Advisor panel (inject if not present)
  if (!document.getElementById('advisorPanel')) {
    document.body.insertAdjacentHTML('beforeend', `
      <div class="advisor-overlay" id="advisorOverlay" onclick="closeAdvisor()"></div>
      <div class="advisor-panel" id="advisorPanel">
        <div class="advisor-hd">
          <span class="advisor-hd-icon">🤖</span>
          <div class="advisor-hd-text">
            <div class="advisor-hd-title">AIコンシェルジュ</div>
            <div class="advisor-hd-sub">Powered by Claude Sonnet</div>
          </div>
          <button class="advisor-close" onclick="closeAdvisor()">✕</button>
        </div>
        <div class="advisor-body" id="advisorBody"></div>
        <div class="advisor-input-area">
          <textarea class="advisor-textarea" id="advisorInput" rows="3"
            placeholder="例: TikTokショート動画を量産したい"
            onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();advisorSubmit()}"
          ></textarea>
          <div class="advisor-input-row">
            <span class="advisor-hint">Enterで送信 / Shift+Enterで改行</span>
            <button class="advisor-submit" onclick="advisorSubmit()">🚀 提案する</button>
          </div>
        </div>
      </div>`);
  }

  const advisorBody = document.getElementById('advisorBody');
  if (advisorBody && !advisorBody.innerHTML.trim()) {
    advisorBody.innerHTML = buildAdvisorWelcome();
  }

  renderSidebar();
  renderContent();
  updateMeta();

  const tt = document.getElementById('topbarTitle');
  if (tt) tt.textContent = 'すべてのGem';
}

document.addEventListener('DOMContentLoaded', init);
</script>
